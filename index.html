<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Fever</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script>
        if (typeof interact === 'undefined') {
            document.write('<script src="lib/interact.min.js"><\\/script>');
        }
    </script>
</head>
<body>
    <!-- Main game area — FloorScene renders into this -->
    <div id="game-container"></div>

    <!-- Plating popup — always in DOM, shown/hidden by PlatingScene -->
    <div id="plating-popup" style="display:none;">
        <div class="plating-popup-content">
            <h2>Plating</h2>
            <div id="plating-plate-area"></div>
            <div id="plating-topping-bin"></div>
            <div class="plating-actions">
                <button id="plating-cancel">Cancel</button>
                <button id="plating-confirm">Plate It!</button>
            </div>
        </div>
    </div>

    <!-- Keema noodles plating popup -->
    <div id="noodles-popup" style="display:none;">
        <div class="noodles-popup-content">
            <h2 style="margin:0;color:#5c3a21;">🍜 Keema Noodles</h2>
            <div id="noodles-plate-area">
                <img id="noodles-step-img" src="" draggable="false" />
            </div>
            <div id="noodles-hint"></div>
            <div id="noodles-ingredient-bin"></div>
            <div class="noodles-actions">
                <button id="noodles-cancel">Cancel</button>
                <button id="noodles-confirm" disabled>Serve!</button>
            </div>
        </div>
    </div>

    <!-- Laphing prep mini-game popup -->
    <div id="laphing-popup" style="display:none;">
        <div class="laphing-popup-content">
            <h2 style="margin:0;color:#5c3a21;">🫔 Making Laphing</h2>
            <div id="laphing-plate-area"></div>
            <div id="laphing-hint"></div>
            <div id="laphing-ingredient-bin"></div>
            <div class="laphing-actions">
                <button id="laphing-cancel">Cancel</button>
                <button id="laphing-confirm" disabled>Serve!</button>
            </div>
        </div>
    </div>

    <!-- Tally screen — shown by TallyScreen.show(), content injected dynamically -->
    <div id="tally-screen" style="display:none;"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
