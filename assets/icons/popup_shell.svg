<svg viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg">
  <!-- Momo Fever: Plating Mini-Game Popup Shell -->
  <!-- Layout (top to bottom): header w/ title + close, plate work area,
       topping tray (4 slots), confirm button footer -->

  <!-- popup card -->
  <rect x="20" y="20" width="600" height="520" rx="28"
        fill="#fbf3e6" stroke="#5c3a21" stroke-width="6"/>

  <!-- header bar -->
  <path d="M20 48 a28 28 0 0 1 28 -28 h544 a28 28 0 0 1 28 28 v36 h-600 z"
        fill="#f4a9b8" stroke="#5c3a21" stroke-width="6"/>
  <text x="300" y="58" font-family="Arial, sans-serif" font-size="26" font-weight="bold"
        text-anchor="middle" fill="#5c3a21">Plate it!</text>

  <!-- close (X) button, top right -->
  <circle cx="592" cy="50" r="18" fill="#e8746a" stroke="#5c3a21" stroke-width="4"/>
  <path d="M585 43 L599 57 M599 43 L585 57" stroke="#5c2620" stroke-width="4" stroke-linecap="round"/>

  <!-- plate work area -->
  <ellipse cx="320" cy="220" rx="160" ry="115" fill="#ffffff" stroke="#cbb89a" stroke-width="6"/>
  <ellipse cx="320" cy="220" rx="136" ry="96" fill="none" stroke="#e8e0d0" stroke-width="3"/>
  <text x="320" y="222" font-family="Arial, sans-serif" font-size="16" fill="#cbb89a"
        text-anchor="middle" opacity="0.7">drop item + toppings here</text>

  <!-- topping tray strip -->
  <rect x="50" y="360" width="540" height="80" rx="18"
        fill="#e8dcc8" stroke="#5c3a21" stroke-width="5"/>
  <text x="70" y="352" font-family="Arial, sans-serif" font-size="15" fill="#8a7558">toppings</text>
  <!-- 4 tray slots -->
  <rect x="66" y="372" width="118" height="56" rx="12" fill="#fbf3e6" stroke="#cbb89a" stroke-width="3"/>
  <rect x="196" y="372" width="118" height="56" rx="12" fill="#fbf3e6" stroke="#cbb89a" stroke-width="3"/>
  <rect x="326" y="372" width="118" height="56" rx="12" fill="#fbf3e6" stroke="#cbb89a" stroke-width="3"/>
  <rect x="456" y="372" width="118" height="56" rx="12" fill="#fbf3e6" stroke="#cbb89a" stroke-width="3"/>

  <!-- footer: confirm button -->
  <rect x="190" y="466" width="260" height="56" rx="28"
        fill="#9fd88a" stroke="#5c3a21" stroke-width="5"/>
  <text x="320" y="502" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
        text-anchor="middle" fill="#3a5c2a">Plate it</text>
  <path d="M384 494 L390 500 L398 488" fill="none" stroke="#3a5c2a" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
