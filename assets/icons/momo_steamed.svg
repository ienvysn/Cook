    <!-- kawaii face on the front dumpling -->
    <circle cx="73" cy="110" r="2.6" fill="#3a2317"/>
    <circle cx="87" cy="110" r="2.6" fill="#3a2317"/>
    <path d="M76 116 Q80 119 84 116" fill="none" stroke="#3a2317" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="70" cy="114" rx="4" ry="2.5" fill="#f4a9b8" opacity="0.6"/>
    <ellipse cx="90" cy="114" rx="4" ry="2.5" fill="#f4a9b8" opacity="0.6"/>
  </g>

  <!-- steam wisps -->
  <path d="M80 70 Q76 58 82 48 Q86 40 80 30" fill="none" stroke="#cbb89a" stroke-width="4"
        stroke-linecap="round" opacity="0.7"/>
  <path d="M58 76 Q54 66 60 56" fill="none" stroke="#cbb89a" stroke-width="3"
